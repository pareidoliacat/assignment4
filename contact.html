<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Imran Kairbek</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
</head>
<body>

  <!-- NAVIGATION BAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Imran Kairbek</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <!-- PAGE HEADER -->
  <header class="page-header text-center">
    <h1>Contact Me</h1>
    <p>Feel free to reach out!</p>
  </header>


  <!-- FORM + INFO -->
  <!-- Two columns: form on the left, contact info on the right -->
  <section class="container my-5">
    <div class="row g-5">

      <!-- Left column: Contact form -->
      <div class="col-lg-7">
        <h2 class="mb-4">Send a Message</h2>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label" for="firstName">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="Your first name" />
          </div>

          <div class="col-md-6">
            <label class="form-label" for="lastName">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Your last name" />
          </div>

          <div class="col-12">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" />
          </div>

          <div class="col-12">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Say something..."></textarea>
          </div>

          <div class="col-12">
            <button type="button" class="btn btn-primary w-100" onclick="sendMessage()">
              Send Message
            </button>
          </div>

        </div>
      </div>

      <!-- Right column: Contact details -->
      <div class="col-lg-5">
        <h2 class="mb-4">Find Me Here</h2>

        <div class="contact-item">
          <span class="contact-icon">📧</span>
          <div>
            <strong>Email</strong>
            <p>kairbek.imr@bk.ru</p>
          </div>
        </div>

        <div class="contact-item">
          <span class="contact-icon">💬</span>
          <div>
            <strong>Telegram</strong>
            <p>@lostmond</p>
          </div>
        </div>

        <div class="contact-item">
          <span class="contact-icon">🎓</span>
          <div>
            <strong>University</strong>
            <p>ST-2403 — Smart Technology, AITU</p>
          </div>
        </div>

      </div>

    </div>
  </section>


  <!-- FOOTER -->
  <footer class="text-center py-4">
    <p>© 2025 Imran Kairbek — ST-2403</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function sendMessage() {
      const email   = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!email || !message) {
        alert('Please fill in your email and message.');
        return;
      }

      alert('Message sent! I will get back to you soon.');

      // Clear the form
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value  = '';
      document.getElementById('email').value     = '';
      document.getElementById('message').value   = '';
    }
  </script>

</body>
</html>
